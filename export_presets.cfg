; Bra! — Godot Web/PWA export preset (ADR-0004).
;
; A single Web preset, exported to GitHub Pages by .github/workflows/deploy.yml:
;   godot --headless --export-release "Web" build/web/index.html
; The CLI output path above overrides export_path below.
;
; Single-threaded (variant/thread_support=false): no SharedArrayBuffer, so the
; build runs on GitHub Pages WITHOUT COOP/COEP cross-origin isolation headers
; (ADR-0001 / ADR-0005). progressive_web_app/enabled=true ships the PWA
; manifest + service worker (ADR-0004); the cross-origin-isolation service-worker
; reload hack is OFF because we are single-threaded and do not need it.

[preset.0]

name="Web"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/web/index.html"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
html/godot_pool_size_hint=4
html/seal_progress_bar=false
progressive_web_app/enabled=true
progressive_web_app/ensure_cross_origin_isolation_headers=false
progressive_web_app/offline_page=""
; display/orientation are int enums: display 0=fullscreen 1=standalone 2=minimal-ui
; 3=browser; orientation 0=any 1=landscape 2=portrait. Portrait standalone install.
progressive_web_app/display=1
progressive_web_app/orientation=2
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0.53, 0.81, 0.92, 1)

; ── Licensed profile (ADR-0006 / task 025) ───────────────────────────────────
; Identical to "Web" but with PCK encryption ON, so the gitignored licensed
; Labrador (assets/models/dog_licensed.glb, injected from a CI secret) is not
; trivially extractable from the published .pck (deterrence, not DRM). Only the
; licensed CI job exports this preset, with GODOT_SCRIPT_ENCRYPTION_KEY set from
; a secret. The local verify gate and the public CC0 deploy export "Web" (above)
; and never touch this profile, so they need no key and stay green without it.
[preset.1]

name="Web Licensed"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/web-licensed/index.html"
patches=PackedStringArray()
encryption_include_filters="*"
encryption_exclude_filters=""
seed=0
encrypt_pck=true
encrypt_directory=true
script_export_mode=2

[preset.1.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
html/godot_pool_size_hint=4
html/seal_progress_bar=false
progressive_web_app/enabled=true
progressive_web_app/ensure_cross_origin_isolation_headers=false
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=2
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0.53, 0.81, 0.92, 1)

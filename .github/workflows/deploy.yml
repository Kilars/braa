name: Deploy to GitHub Pages

# Builds the PWA on the runner and publishes dist/ to GitHub Pages.
#
# Why CI-build (not a local `dist` push): the paid, no-redistribution Labrador
# asset (public/models/dog.glb) is gitignored and never enters git history. The
# runner checks out the repo *without* it, so the deployed site can never leak
# the paid asset — and the app falls back to the procedural dog (renderConfig
# .importedDog is false by default), so the site stays fully functional.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scopes required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Site lives at https://kilars.github.io/braa/ — must match the repo
          # name exactly. If the repo is renamed to "bra", change this to /bra/.
          BASE_PATH: /braa/

      # enablement: true lets this step turn Pages on (source = GitHub Actions)
      # via the API on the first deploy, so no manual Settings → Pages step.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

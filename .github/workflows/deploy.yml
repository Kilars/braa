name: Deploy to GitHub Pages

# Every push to main builds the Vite bundle and publishes dist/ to Pages.
# Live at https://kilars.github.io/braa/ (relative base "./" in vite.config.ts
# makes the build work under the project sub-path — ADR-0005).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploy needs these; contents:read for checkout.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

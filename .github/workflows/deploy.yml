name: Deploy to GitHub Pages

# Builds the PWA on the runner and publishes dist/ to GitHub Pages.
#
# Why CI-build (not a local `dist` push): the paid, no-redistribution Labrador
# asset (public/models/dog.glb) is gitignored and never enters git history. The
# runner checks out the repo *without* it, so the deployed site can never leak
# the paid asset — and the app falls back to the procedural dog (renderConfig
# .importedDog is false by default), so the site stays fully functional.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scopes required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Project site lives at https://<user>.github.io/bra/ — rename this if
          # the repo is not "bra" (or drop it entirely for a user/org page).
          BASE_PATH: /bra/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
